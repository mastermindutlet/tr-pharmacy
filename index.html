<!DOCTYPE html>
<html>
<head>
<title>TR Pharmacy</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

input,button{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>TR Pharmacy Sales</h2>

<input id="name" placeholder="Medicine Name">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Qty">

<button onclick="add()">Add Sale</button>

<table>

<tr>
<th>Medicine</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>

<tbody id="list"></tbody>

</table>

<h3 id="total">Total Sale: 0</h3>

</div>

<script>

let total=0;

function add(){

let n=document.getElementById("name").value;
let p=document.getElementById("price").value;
let q=document.getElementById("qty").value;

let t=p*q;

total+=Number(t);

document.getElementById("list").innerHTML+=
"<tr><td>"+n+"</td><td>"+p+"</td><td>"+q+"</td><td>"+t+"</td></tr>";

document.getElementById("total").innerText="Total Sale: "+total;

}

</script>

</body>
</html>
