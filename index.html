<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TR Pharmacy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>TR Pharmacy</h1>
<p>Quality Medicine & Healthcare</p>
</header>

<section>
<h2>Medicine List</h2>
<input type="text" id="searchInput" onkeyup="searchMedicine()" placeholder="Search Medicine...">
<table id="medicineTable">
<tr>
<th>Medicine</th>
<th>Price (Tk)</th>
<th>Stock</th>
</tr>
<tr>
<td>Napa 500 mg</td>
<td>10</td>
<td>Available</td>
</tr>
<tr>
<td>Seclo 20 mg</td>
<td>7</td>
<td>Available</td>
</tr>
<tr>
<td>Histacin</td>
<td>3</td>
<td>Low stock</td>
</tr>
<tr>
<td>Monas 10 mg</td>
<td>12</td>
<td>Available</td>
</tr>
</table>
</section>

<section>
<h2>Order Medicine</h2>
<form id="orderForm" onsubmit="submitOrder(event)">
<label>Name:</label><br>
<input type="text" id="customerName" required><br>
<label>Phone:</label><br>
<input type="text" id="customerPhone" required><br>
<label>Medicine Name:</label><br>
<input type="text" id="customerMedicine" required><br>
<label>Quantity:</label><br>
<input type="number" id="customerQuantity" required min="1"><br><br>
<button type="submit">Submit Order via WhatsApp</button>
</form>
</section>

<script src="script.js"></script>
</body>
</html>
